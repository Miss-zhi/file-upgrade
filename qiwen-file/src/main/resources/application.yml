# ==================== 服务器配置 ====================
server:
  port: 8080

# ==================== Spring 配置 ====================
spring:
  application:
    name: qiwen-file

  # 数据源
  datasource:
    url: jdbc:mysql://localhost:3306/qiwen_file?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # 配置文件激活
  profiles:
    active: dev

# ==================== MyBatis-Plus ====================
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.qiwenshare.file.domain
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ==================== Elasticsearch ====================
elasticsearch:
  host: localhost
  port: 9200

# ==================== JWT ====================
jwt:
  secret: cWl3ZW5maWxlLWp3dC1zZWNyZXQta2V5LWZvci10b2tlbi1zaWduaW5n
  expiration: 604800
  token-prefix: "Bearer "
  header: Authorization

# ==================== SpringDoc OpenAPI ====================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# ==================== UFOP 存储 ====================
ufop:
  storage-type: local
  local:
    root-path: ./uploads

# ==================== 日志 ====================
logging:
  level:
    com.qiwenshare: debug
    org.springframework.security: info
