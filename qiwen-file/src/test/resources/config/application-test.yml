# ==================== 测试配置 ====================
spring:
  # H2 内存数据库
  datasource:
    url: jdbc:h2:mem:qiwen_file_test;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: never
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  # 禁用 ES 自动配置（测试无 ES）
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration

mybatis-plus:
  global-config:
    db-config:
      id-type: ASSIGN_ID

elasticsearch:
  host: localhost
  port: 9200

ufop:
  local:
    root-path: ./target/ufop-test

jwt:
  secret: dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3Rpbmc=
  expiration: 3600
  token-prefix: "Bearer "
  header: Authorization
