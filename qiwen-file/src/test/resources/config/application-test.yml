# ==================== 测试配置 ====================
spring:
  # H2 内存数据库
  datasource:
    url: jdbc:h2:mem:qiwen_file_test;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA 自动建表
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  # 关闭 Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# MyBatis-Plus
mybatis-plus:
  global-config:
    db-config:
      id-type: ASSIGN_ID

# ES（测试环境跳过）
elasticsearch:
  host: localhost
  port: 9200

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration

# JWT
jwt:
  secret: dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3Rpbmc=
  expiration: 3600
  token-prefix: "Bearer "
  header: Authorization
