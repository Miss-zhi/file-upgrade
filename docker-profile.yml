# ==================== 生产环境配置 ====================
# docker-profile.yml — 通过 docker compose --profile prod 激活
# 覆盖 application.yml 中的本地开发配置

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/qiwen_file?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: qiwen
    password: ${MYSQL_PASSWORD:qiwen123}

  data:
    redis:
      host: redis
      port: 6379

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

elasticsearch:
  host: elasticsearch
  port: 9200

jwt:
  secret: ${JWT_SECRET}

ufop:
  storage-type: ${UFOP_STORAGE_TYPE:local}
  local-storage-path: /data/uploads

logging:
  level:
    com.qiwenshare: info
    org.springframework.security: warn
