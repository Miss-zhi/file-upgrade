# =============================================================================
# 奇文网盘 CI/CD 流水线（目标技术栈：Java 17 + Vue 3 + Vite）
# 触发：push 到 main/develop，或 pull request 到 main
# 两条并行流水线：
#   前端：lint → typecheck → build
#   后端：compile → test → package
# 最终由 ci-summary 汇总结果
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  JAVA_DIST: 'zulu'
  NODE_VERSION: '20'

jobs:
  # ======================== 前端流水线 ========================

  frontend-lint:
    name: 前端 Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qiwen-file-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: qiwen-file-web/package-lock.json

      - name: 安装依赖
        run: npm ci --no-audit

      - name: ESLint 检查
        run: npx eslint src/ --ext .vue,.js,.ts

  frontend-typecheck:
    name: 前端类型检查
    needs: [frontend-lint]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qiwen-file-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: qiwen-file-web/package-lock.json

      - name: 安装依赖
        run: npm ci --no-audit

      - name: 类型检查
        run: npx vue-tsc --noEmit

  frontend-build:
    name: 前端构建
    needs: [frontend-typecheck]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qiwen-file-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: qiwen-file-web/package-lock.json

      - name: 安装依赖
        run: npm ci --no-audit

      - name: Vite 生产构建
        run: npx vite build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: qiwen-file-web/dist/
          retention-days: 7

  # ======================== 后端流水线 ========================

  backend-compile:
    name: 后端编译
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}
          cache: maven

      - name: 编译（跳过测试）
        run: mvn compile -f qiwen-file/pom.xml -B -q -DskipTests

  backend-test:
    name: 后端单元测试
    needs: [backend-compile]
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: file_test
          MYSQL_CHARACTER_SET_SERVER: utf8mb4
          MYSQL_COLLATION_SERVER: utf8mb4_general_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}
          cache: maven

      - name: 准备测试配置
        run: |
          mkdir -p qiwen-file/src/test/resources/config
          PROPS=qiwen-file/src/test/resources/config/application.properties
          echo "server.port=8080" > $PROPS
          echo "spring.profiles.active=test" >> $PROPS
          echo "" >> $PROPS
          echo "# MySQL (CI service)" >> $PROPS
          echo "spring.datasource.url=jdbc:mysql://localhost:3306/file_test?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&allowPublicKeyRetrieval=true" >> $PROPS
          echo "spring.datasource.username=root" >> $PROPS
          echo "spring.datasource.password=root" >> $PROPS
          echo "spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver" >> $PROPS
          echo "" >> $PROPS
          echo "# JPA" >> $PROPS
          echo "spring.jpa.hibernate.ddl-auto=create-drop" >> $PROPS
          echo "spring.jpa.show-sql=false" >> $PROPS
          echo "" >> $PROPS
          echo "# MyBatis-Plus" >> $PROPS
          echo "mybatis-plus.mapper-locations=classpath:mapper/*.xml" >> $PROPS
          echo "mybatis-plus.type-aliases-package=com.qiwenshare.file.domain" >> $PROPS
          echo "mybatis-plus.global-config.db-type=global" >> $PROPS
          echo "" >> $PROPS
          echo "# Redis (CI service)" >> $PROPS
          echo "spring.redis.host=localhost" >> $PROPS
          echo "spring.redis.port=6379" >> $PROPS
          echo "spring.redis.password=" >> $PROPS
          echo "" >> $PROPS
          echo "# Storage: local (test)" >> $PROPS
          echo "ufop.storage-type=0" >> $PROPS
          echo "" >> $PROPS
          echo "# JWT" >> $PROPS
          echo "jwt.secret=test-secret-key-for-ci-only-must-be-long-enough" >> $PROPS
          echo "jwt.expiration=604800" >> $PROPS
          echo "jwt.issuer=qiwen-test" >> $PROPS
          echo "" >> $PROPS
          echo "# Elasticsearch: disabled for unit tests" >> $PROPS
          echo "spring.elasticsearch.uris=http://localhost:9200" >> $PROPS
          echo "management.health.elasticsearch.enabled=false" >> $PROPS
          echo "" >> $PROPS
          echo "# Async thread pool" >> $PROPS
          echo "async.thread-pool.enabled=false" >> $PROPS

      - name: 运行测试
        run: mvn test -f qiwen-file/pom.xml -B

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: qiwen-file/target/surefire-reports/
          retention-days: 7

  backend-package:
    name: 后端打包
    needs: [backend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}
          cache: maven

      - name: 打包
        run: mvn package -f qiwen-file/pom.xml -B -DskipTests -Dmaven.assembly.skip=true

      - name: 上传 JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: qiwen-file/target/*.jar
          retention-days: 7

  # ======================== 汇总 ========================

  ci-summary:
    name: CI 结果汇总
    needs: [frontend-lint, frontend-typecheck, frontend-build, backend-compile, backend-test, backend-package]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 检查结果
        run: |
          echo "========== CI 流水线结果 =========="
          echo "前端 Lint:      ${{ needs.frontend-lint.result }}"
          echo "前端类型检查:   ${{ needs.frontend-typecheck.result }}"
          echo "前端构建:       ${{ needs.frontend-build.result }}"
          echo "后端编译:       ${{ needs.backend-compile.result }}"
          echo "后端测试:       ${{ needs.backend-test.result }}"
          echo "后端打包:       ${{ needs.backend-package.result }}"
          echo "==================================="

          if [[ "${{ needs.frontend-build.result }}" == "failure" ]] || \
             [[ "${{ needs.backend-package.result }}" == "failure" ]]; then
            echo "::error::CI 流水线存在失败任务"
            exit 1
          fi

          echo "All checks passed"
