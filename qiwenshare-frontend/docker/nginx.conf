# ============================================================
# 奇文网盘前端 Nginx 配置
# - SPA History 模式路由支持
# - API 反向代理到后端
# - OnlyOffice 反向代理
# - WebSocket 支持（OnlyOffice 协同编辑）
# ============================================================

server {
    listen 80;
    server_name _;

    # 上传文件大小限制（与后端 multipart.max-file-size 一致）
    client_max_body_size 500m;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/vnd.ms-fontobject application/x-font-ttf
        font/opentype image/svg+xml;

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # OnlyOffice API JS（前端通过 /onlyoffice/ 路径加载）
    location /onlyoffice/ {
        proxy_pass http://onlyoffice:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # OnlyOffice 需要 WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 长连接超时（编辑会话可能持续数小时）
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API 反向代理到后端
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 文件上传需要较大的超时和缓冲
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Actuator 健康检查（可选，供 Docker HEALTHCHECK 或负载均衡器使用）
    location /actuator/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    # SPA History 模式路由 — 所有非文件请求回退到 index.html
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
