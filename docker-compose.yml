version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: qiwenshare-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: qiwenshare
      MYSQL_USER: qiwenshare
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-qiwenshare123}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=caching_sha2_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: qiwenshare-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    restart: unless-stopped

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: qiwenshare-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: qiwenshare-oo
    environment:
      - JWT_SECRET=${OO_JWT_SECRET:-your-onlyoffice-jwt-secret-must-be-long-enough-256bits}
    ports:
      - "8021:80"
    volumes:
      - oo_data:/var/www/onlyoffice/Data
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  es_data:
  oo_data:
