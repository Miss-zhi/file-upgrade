version: '3.8'

# ============================================================
# OnlyOffice Document Server - Docker Compose
# 仅限内网访问，禁止暴露至公网
# 支撑 Word / Excel / PowerPoint 文件的在线预览、编辑与保存
# ============================================================

services:

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: qiwen-onlyoffice
    restart: unless-stopped
    environment:
      # JWT 安全令牌 — 必须与后端 application.properties 中 files.docservice.secret 一致
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-my_secret_code}
      JWT_HEADER: Authorization
      # 允许 OnlyOffice 回调内网私有 IP（虚拟机/宿主机后端服务）
      ALLOW_PRIVATE_IP_ADDRESSING: "true"
      # 禁用 HTTPS（内网 HTTP 部署）
      ONLYOFFICE_HTTPS_HSTS_ENABLED: "false"
      USE_UNAUTHORIZED_STORAGE: "true"
    ports:
      - "${ONLYOFFICE_PORT:-8021}:80"
    volumes:
      - onlyoffice-data:/var/www/onlyoffice/Data
      - onlyoffice-logs:/var/log/onlyoffice
      - onlyoffice-fonts:/usr/share/fonts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/welcome/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# ==================== 数据卷 ====================
volumes:
  onlyoffice-data:
    name: qiwen-onlyoffice-data
  onlyoffice-logs:
    name: qiwen-onlyoffice-logs
  onlyoffice-fonts:
    name: qiwen-onlyoffice-fonts
