services:
  mysql:
    image: mysql:8.0
    container_name: qiwen-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: qiwen_file
      MYSQL_USER: qiwen
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-qiwen123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qiwen-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    image: ${IMAGE_BACKEND:-ghcr.io/miss-zhi/file-upgrade/backend}:${IMAGE_TAG:-latest}
    container_name: qiwen-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/qiwen_file?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: qiwen
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-qiwen123}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: ${JWT_SECRET:-default-secret-key-change-me-in-production}
      UFOP_STORAGE_TYPE: local
      UFOP_LOCAL_STORAGE_PATH: /data/uploads
    volumes:
      - upload_data:/data/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: ${IMAGE_FRONTEND:-ghcr.io/miss-zhi/file-upgrade/frontend}:${IMAGE_TAG:-latest}
    container_name: qiwen-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: qiwen-onlyoffice
    restart: unless-stopped
    ports:
      - "8090:80"
    environment:
      JWT_ENABLED: "false"
    volumes:
      - oo_data:/var/log/onlyoffice
      - oo_lib:/var/lib/onlyoffice

volumes:
  mysql_data:
  redis_data:
  upload_data:
  oo_data:
  oo_lib:
